<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GameShare Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      overflow-x: hidden;
      background: black;
    }

    /* Background animation */
    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(270deg, #ff00cc, #3333ff, #00ffcc);
      background-size: 600% 600%;
      animation: gradientMove 10s ease infinite;
      z-index: -1;
    }

    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    /* Animated title */
    h1 {
      text-align: center;
      font-size: 3em;
      margin-top: 50px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    .container {
      text-align: center;
      margin-top: 50px;
      padding: 20px;
    }

    .card {
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 15px;
      display: inline-block;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00cc99;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

<div class="background"></div>

<h1 id="title">🎮 GameShare Hub 🎮</h1>

<div class="container">
  <div class="card">
    <h2>📥 Télécharger le jeu</h2>
    <p>
      Clique sur le bouton ci-dessous pour accéder au lien de téléchargement.
      Assure-toi d'avoir assez d'espace et une bonne connexion !
    </p>

    <a class="btn" href="https://gofile.io/d/fCD3eh" target="_blank">
      🔗 Accéder au lien
    </a>

    <p style="margin-top:20px; font-size: 0.9em; opacity: 0.8;">
      ⚠️ Télécharge uniquement si tu fais confiance à la source.
    </p>
  </div>
</div>

<script>
  const title = document.getElementById("title");

  let colors = ["#ff00cc", "#00ffcc", "#ffff00", "#ff6600"];
  let i = 0;

  setInterval(() => {
    title.style.color = colors[i];
    i = (i + 1) % colors.length;
  }, 500);
</script>

</body>
</html>
